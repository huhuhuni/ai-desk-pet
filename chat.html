<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Chat - AI Desk Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }

    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
    .header .pet-icon { font-size: 24px; }
    .header .title { font-size: 14px; font-weight: bold; }
    .header .status { font-size: 11px; opacity: 0.8; }

    .chat-container { flex: 1; overflow-y: auto; padding: 10px; background: #e5ddd5; }
    .message { margin-bottom: 10px; display: flex; }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .message-content { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; }
    .message.user .message-content { background: #667eea; color: white; border-bottom-right-radius: 4px; }
    .message.assistant .message-content { background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .message-time { font-size: 9px; opacity: 0.6; margin-top: 4px; }
    .message.user .message-time { text-align: right; }

    .input-container { padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; display: flex; gap: 8px; }
    .input-container input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; outline: none; }
    .input-container input:focus { border-color: #667eea; }
    .input-container button { background: #667eea; color: white; border: none; padding: 10px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .input-container button:hover { background: #5a6fd6; }
    .input-container button:disabled { background: #ccc; cursor: not-allowed; }

    .empty-state { text-align: center; padding: 40px 20px; color: #888; }
    .empty-state .icon { font-size: 48px; margin-bottom: 10px; }
    .empty-state .text { font-size: 14px; }

    .typing-indicator { display: none; padding: 10px; }
    .typing-indicator.show { display: flex; }
    .typing-indicator .dots { display: flex; gap: 4px; padding: 8px 12px; background: white; border-radius: 12px; }
    .typing-indicator .dot { width: 8px; height: 8px; background: #999; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .typing-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="pet-icon">🐱</span>
    <div>
      <div class="title" id="headerTitle">AI Desk Pet</div>
      <div class="status" id="headerStatus">Online</div>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="empty-state" id="emptyState">
      <div class="icon">🐱</div>
      <div class="text" id="emptyText">Say hi to start a conversation!</div>
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="input-container">
    <input type="text" id="userInput" placeholder="Type a message...">
    <button id="sendBtn">Send</button>
  </div>

  <script>
    let currentLang = 'zh';
    let chatHistory = [];

    const chatContainer = document.getElementById('chatContainer');
    const emptyState = document.getElementById('emptyState');
    const emptyText = document.getElementById('emptyText');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const headerTitle = document.getElementById('headerTitle');
    const headerStatus = document.getElementById('headerStatus');

    async function init() {
      const settings = await window.electronAPI.getSettings();
      currentLang = settings.language || 'zh';
      updateUIText();

      // 加载聊天历史
      chatHistory = await window.electronAPI.getChatContext();
      renderChatHistory();
    }

    function updateUIText() {
      headerTitle.textContent = currentLang === 'zh' ? '桌面宠物' : 'AI Desk Pet';
      headerStatus.textContent = currentLang === 'zh' ? '在线' : 'Online';
      userInput.placeholder = currentLang === 'zh' ? '输入消息...' : 'Type a message...';
      sendBtn.textContent = currentLang === 'zh' ? '发送' : 'Send';
      emptyText.textContent = currentLang === 'zh' ? '说点什么开始对话吧！' : 'Say hi to start a conversation!';
    }

    function renderChatHistory() {
      if (chatHistory.length === 0) {
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      chatHistory.forEach(function(msg) {
        addMessageToUI(msg.role, msg.content, msg.timestamp, false);
      });

      scrollToBottom();
    }

    function addMessageToUI(role, content, timestamp, animate) {
      var msgDiv = document.createElement('div');
      msgDiv.className = 'message ' + role;

      var time = new Date(timestamp);
      var timeStr = time.getHours().toString().padStart(2, '0') + ':' + time.getMinutes().toString().padStart(2, '0');

      msgDiv.innerHTML = '<div class="message-content">' + escapeHtml(content) + '<div class="message-time">' + timeStr + '</div></div>';

      if (animate) {
        msgDiv.style.opacity = '0';
        msgDiv.style.transform = 'translateY(10px)';
      }

      chatContainer.appendChild(msgDiv);

      if (animate) {
        setTimeout(function() {
          msgDiv.style.transition = 'all 0.3s ease';
          msgDiv.style.opacity = '1';
          msgDiv.style.transform = 'translateY(0)';
        }, 10);
      }
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showTyping() {
      typingIndicator.classList.add('show');
      scrollToBottom();
    }

    function hideTyping() {
      typingIndicator.classList.remove('show');
    }

    async function sendMessage() {
      var message = userInput.value.trim();
      if (!message) return;

      userInput.value = '';
      sendBtn.disabled = true;

      // 添加用户消息到 UI
      emptyState.style.display = 'none';
      addMessageToUI('user', message, Date.now(), true);
      scrollToBottom();

      // 显示正在输入
      showTyping();

      try {
        var response = await window.electronAPI.chat(message);
        hideTyping();

        // 添加助手回复到 UI
        addMessageToUI('assistant', response, Date.now(), true);
        scrollToBottom();
      } catch (e) {
        hideTyping();
        addMessageToUI('assistant', currentLang === 'zh' ? '抱歉，出了点问题...' : 'Sorry, something went wrong...', Date.now(), true);
      }

      sendBtn.disabled = false;
      userInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    // 监听宠物主动说的话
    window.electronAPI.onNewComment(function(comment) {
      hideTyping();
      emptyState.style.display = 'none';
      addMessageToUI('assistant', comment, Date.now(), true);
      scrollToBottom();
    });

    init();
  </script>
</body>
</html>
